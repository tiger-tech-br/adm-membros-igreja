<!DOCTYPE html>
<html lang="pt-BR">

    <head>

        <!-- ========================= -->
        <!-- META -->
        <!-- ========================= -->

        <meta charset="UTF-8">

        <meta

            name="viewport"

            content="width=device-width, initial-scale=1.0">

        <title>

            Painel Administrativo

        </title>

        <!-- ========================= -->
        <!-- GOOGLE FONTS -->
        <!-- ========================= -->

        <link

            rel="preconnect"

            href="https://fonts.googleapis.com">

        <link

            rel="preconnect"

            href="https://fonts.gstatic.com"

            crossorigin>

        <link

            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"

            rel="stylesheet">

        <!-- ========================= -->
        <!-- FONT AWESOME -->
        <!-- ========================= -->

        <link

            rel="stylesheet"

            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!-- ========================= -->
        <!-- CSS GLOBAL -->
        <!-- ========================= -->

        <link rel="stylesheet" href="/admin/css/global/reset.css">

        <link rel="stylesheet" href="/admin/css/global/variables.css">

        <link rel="stylesheet" href="/admin/css/global/base.css">

        <link rel="stylesheet" href="/admin/css/layout/layout.css">

        <link rel="stylesheet" href="/admin/css/pages/dashboard.css?v=2.0.0">


    </head>

    <body>

    <!-- ========================= -->
    <!-- OVERLAY -->
    <!-- ========================= -->

    <div class="overlay"></div>

        <button

        id="btnMenu"

        class="menu-toggle"

        type="button"

        aria-label="Abrir menu"

        aria-expanded="false">

        <i class="fa-solid fa-bars"></i>

    </button>

    <!-- ========================= -->
    <!-- DASHBOARD -->
    <!-- ========================= -->

    <div class="dashboard">

        <!-- ========================= -->
        <!-- SIDEBAR -->
        <!-- ========================= -->

        <aside class="sidebar">

            <div class="logo">

                <img

                    src="/images/assembleia-logo.png"

                    alt="Logo da Igreja">

            </div>

            <nav>

                <ul class="menu">

                    <li class="active">

                        <a href="/dashboard">

                            <i class="fa-solid fa-chart-line"></i>

                            Dashboard

                        </a>

                    </li>

                    <li>

                        <a href="/membros">

                            <i class="fa-solid fa-users"></i>

                            Membros

                        </a>

                    </li>

                    <li>

                        <a href="/cadastro">

                            <i class="fa-solid fa-user-plus"></i>

                            Cadastrar

                        </a>

                    </li>

                    <li class="logout">

                        <a href="/logout">

                            <i class="fa-solid fa-right-from-bracket"></i>

                            Sair

                        </a>

                    </li>

                </ul>

            </nav>

        </aside>

        <!-- ========================= -->
        <!-- CONTEÚDO -->
        <!-- ========================= -->

        <main class="content">

            <!-- ========================= -->
            <!-- TOPBAR -->
            <!-- ========================= -->

            <header class="topbar">

                <div>

                    <h1>

                        Dashboard

                    </h1>

                    <p>

                        Bem-vindo ao painel administrativo.

                    </p>

                </div>

  

            </header>

            
            <!-- ========================= -->
            <!-- CARDS -->
            <!-- ========================= -->

            <section class="cards">

                <article class="card">

                    <i class="fa-solid fa-users"></i>

                    <h2 id="totalMembros">

                        0

                    </h2>

                    <span>

                        Membros

                    </span>

                </article>

            </section>

            <!-- ========================= -->
            <!-- SCANNER -->
            <!-- ========================= -->

            <section class="scanner-area">

                <a

                    href="/scanner"

                    class="btn-scanner">

                    <i class="fa-solid fa-camera"></i>

                    Escanear QR Code

                </a>

            </section>

            <!-- ========================= -->
            <!-- ÚLTIMOS CADASTROS -->
            <!-- ========================= -->

            <section class="ultimos">

                <h2>

                    Últimos Cadastros

                </h2>

                <table>

                    <thead>

                        <tr>

                            <th>Nome</th>

                            <th>Cargo</th>

                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="tabelaUltimos">

                        <!-- JavaScript -->

                    </tbody>

                </table>

            </section>

        </main>

    </div>

        <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script

        src="/admin/js/layout/menu.js?v=2.0.0">

    </script>

    <script

        src="/admin/js/dashboard/dashboard.js?v=2.0.0">

    </script>

</body>


</html>
