<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>
    
    <link rel="stylesheet" href="/admin/css/global.css">
    <link rel="stylesheet" href="/admin/css/menu.css">
    
    <link rel="stylesheet"
          href="/admin/css/dashboard.css">


    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <div class="overlay"></div>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <img src="/images/assembleia-logo.png"
                 alt="Logo">

        </div>

        <ul class="menu">

            <li class="active">

                <a href="/dashboard">

                    <i class="fa-solid fa-chart-line"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="/membros">

                    <i class="fa-solid fa-users"></i>

                    Membros

                </a>

            </li>

            <li>

                <a href="/cadastro">

                    <i class="fa-solid fa-user-plus"></i>

                    Cadastrar

                </a>

            </li>

        </ul>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <header class="topbar">

            <div>
                <h1>Dashboard</h1>

                <p>Bem-vindo ao painel administrativo.</p>

            </div>

            <div class="topbar-right">


                    <button
                        id="btnMenu"
                        class="menu-toggle">

                        <i class="fa-solid fa-bars"></i>

                    </button>

                    <div class="usuario">

                        <img src="/images/pastor1.jpg" alt="Pastor">

                        <div>

                            <h4>Pastor João Silva</h4>

                            <span>Administrador</span>

                        </div>

                    </div>

            </div>

        </header>
    

        <!-- CARDS -->

        <section class="cards">

            <div class="card">

                <i class="fa-solid fa-users"></i>

                <h2>125</h2>

                <span>Membros</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-check"></i>

                <h2>120</h2>

                <span>Ativos</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-xmark"></i>

                <h2>5</h2>

                <span>Inativos</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-calendar-days"></i>

                <h2>8</h2>

                <span>Eventos</span>

            </div>

        </section>

        <section class="scanner-area">

            <a href="/scanner" class="btn-scanner">

                <i class="fa-solid fa-camera"></i>

                Escanear QR Code

            </a>

        </section>

        <!-- ÚLTIMOS MEMBROS -->

        <section class="ultimos">

    <h2>Últimos Cadastros</h2>

    <table>

        <thead>

            <tr>

                <th>Foto</th>

                <th>Nome</th>

                <th>Cargo</th>

                <th>Status</th>

                <th>Ações</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>

                    <img src="/images/pastor1.jpg"
                         class="foto-membro"
                         alt="Membro">

                </td>

                <td>João Silva</td>

                <td>Pastor</td>

                <td>

                    <span class="status ativo">

                        Ativo

                    </span>

                </td>

                <td>

                    <button class="btn-table">

                        Editar

                    </button>

                </td>

            </tr>

            <tr>

                <td>

                    <img src="/images/pastor2.jpg"
                         class="foto-membro"
                         alt="Membro">

                </td>

                <td>Maria Souza</td>

                <td>Líder do Louvor</td>

                <td>

                    <span class="status ativo">

                        Ativo

                    </span>

                </td>

                <td>

                    <button class="btn-table">

                        Editar

                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </section>

</main>

</div>

<script src="/admin/js/menu.js"></script>
<script src="/admin/js/dashboard.js"></script>

</body>

</html>
