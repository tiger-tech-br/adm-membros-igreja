<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Membro</title>

    <link rel="stylesheet" href="/admin/css/global.css">
    <link rel="stylesheet" href="/admin/css/menu.css">
    <link rel="stylesheet" href="/admin/css/cadastro.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <div class="overlay"></div>
    
<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">

            <img src="/images/assembleia-logo.png"
                 alt="Logo">

        </div>

        <ul class="menu">

            <li>

                <a href="/dashboard">

                    <i class="fa-solid fa-chart-line"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="/membros">

                    <i class="fa-solid fa-users"></i>

                    Membros

                </a>

            </li>

            <li class="active">

                <a href="/cadastro">

                    <i class="fa-solid fa-user-plus"></i>

                    Cadastrar

                </a>

            </li>

        </ul>

    </aside>

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Cadastrar Membro</h1>

                <p>Preencha os dados do novo membro.</p>

            </div>

        </header>

        <form class="cadastro-form" id="formCadastro" enctype="multipart/form-data">
            <!-- FOTO -->

            <!-- FOTO -->

            <div class="form-group">

                <label>Foto do Membro</label>

                <div class="upload-foto">

                    <input
                        type="file"
                        id="foto"
                        accept="image/*"
                        hidden>

                    <label
                        for="foto"
                        class="foto-preview">

                        <img
                            id="preview"
                            src="/images/user.png"
                            alt="Foto">

                        <span>

                            Clique para adicionar uma foto

                        </span>

                    </label>

                </div>

            </div>

            <!-- LINHA 1 -->

            <div class="form-grid">

                <div class="form-group">

                    <label>Nome Completo</label>

                    <input type="text"
                        placeholder="Digite o nome completo" id="nome" name="nome">

                </div>

                    <div class="form-group">

                        <label>Data de Nascimento</label>

                        <input
                            type="text"
                            id="dataNascimento"
                            placeholder="dd/mm/aaaa"
                            maxlength="10"
                            inputmode="numeric"
                            autocomplete="off">

                        <small id="erroData" class="erro-campo"></small>

                    </div>
            </div>

            <!-- LINHA 2 -->

            <div class="form-grid">

                <div class="form-group">

                    <label>Telefone</label>

                    <input type="tel"
                        placeholder="(11) 99999-9999" id="telefone" name="telefone">

                </div>

                <div class="form-group">

                    <label>E-mail (Opcional)</label>

                    <input type="email"
                        placeholder="email@exemplo.com" id="email" name="email">

                </div>

            </div>

            <!-- ENDEREÇO -->

            <div class="form-group">

                <label>Endereço</label>

                <input type="text"
                    placeholder="Rua, número, bairro..." id="endereco" name="endereco">

            </div>

            <!-- LINHA 3 -->

            <div class="form-grid">

                <div class="form-group">

                    <label>Cargo</label>

                    <select id="cargo" name="cargo">

                        <option>Membro</option>

                        <option>Pastor</option>

                        <option>Presbítero</option>

                        <option>Diácono</option>

                        <option>Evangelista</option>

                        <option>Missionário</option>

                        <option>Obreiro</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Ministério</label>

                    <select id="ministerio" name="ministerio">

                        <option>Louvor</option>

                        <option>Infantil</option>

                        <option>Jovens</option>

                        <option>Casais</option>

                        <option>Intercessão</option>

                        <option>Mídia</option>

                        <option>Recepção</option>

                        <option>Outro</option>

                    </select>

                </div>

            </div>

            <!-- LINHA 4 -->

            <div class="form-grid">

                <div class="form-group">

                    <label>Sexo</label>

                    <select id="sexo" name="sexo">

                        <option>Masculino</option>

                        <option>Feminino</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Estado Civil</label>

                    <select id="estadoCivil" name="estadoCivil">

                        <option>Solteiro(a)</option>

                        <option>Casado(a)</option>

                        <option>Divorciado(a)</option>

                        <option>Viúvo(a)</option>

                    </select>

                </div>

            </div>

            <!-- STATUS -->

            <div class="form-group">

                <label>Status</label>

                <select id="status" name="status">

                    <option>Ativo</option>

                    <option>Inativo</option>

                </select>

            </div>

            <!-- OBSERVAÇÕES -->

            <div class="form-group">

                <label>Observações</label>

                <textarea id="observacoes" name="observacoes"
                    placeholder="Informações adicionais..."></textarea>

            </div>

            <!-- BOTÕES -->

            <div class="form-buttons">

                <button
                    type="reset"
                    class="btn-cancelar">

                    Limpar

                </button>

                <button
                    type="submit"
                    class="btn-salvar">

                    Salvar Membro

                </button>

            </div>

            </form>

        </main>

    </div>
<script src="/admin/js/menu.js"></script>
<script src="/admin/js/cadastro.js"></script>

</body>

</html>
