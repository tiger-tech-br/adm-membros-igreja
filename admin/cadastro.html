<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- ========================= -->
    <!-- META -->
    <!-- ========================= -->

    <meta charset="UTF-8">

    <meta

        name="viewport"

        content="width=device-width, initial-scale=1.0">

    <title>

        Cadastrar Membro

    </title>

    <!-- ========================= -->
    <!-- GOOGLE FONTS -->
    <!-- ========================= -->

    <link

        rel="preconnect"

        href="https://fonts.googleapis.com">

    <link

        rel="preconnect"

        href="https://fonts.gstatic.com"

        crossorigin>

    <link

        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"

        rel="stylesheet">

    <!-- ========================= -->
    <!-- FONT AWESOME -->
    <!-- ========================= -->

    <link

        rel="stylesheet"

        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ========================= -->
    <!-- CSS GLOBAL -->
    <!-- ========================= -->

    <link rel="stylesheet" href="/admin/css/global/reset.css">

    <link rel="stylesheet" href="/admin/css/global/variables.css">

    <link rel="stylesheet" href="/admin/css/global/base.css">

    <link rel="stylesheet" href="/admin/css/layout/layout.css">

    <link rel="stylesheet" href="/admin/css/pages/cadastro.css?v=2.0.0">

</head>

    <body>

    <!-- ========================= -->
    <!-- OVERLAY -->
    <!-- ========================= -->

    <div class="overlay"></div>

    <!-- ========================= -->
    <!-- DASHBOARD -->
    <!-- ========================= -->

    <div class="dashboard">

        <!-- ========================= -->
        <!-- SIDEBAR -->
        <!-- ========================= -->

        <aside class="sidebar">

            <div class="logo">

                <img

                    src="/images/assembleia-logo.png"

                    alt="Logo da Igreja">

            </div>

            <nav>

                <ul class="menu">

                    <li>

                        <a href="/dashboard">

                            <i class="fa-solid fa-chart-line"></i>

                            Dashboard

                        </a>

                    </li>

                    <li>

                        <a href="/membros">

                            <i class="fa-solid fa-users"></i>

                            Membros

                        </a>

                    </li>

                    <li class="active">

                        <a href="/cadastro">

                            <i class="fa-solid fa-user-plus"></i>

                            Cadastrar

                        </a>

                    </li>

                    <li class="logout">

                        <a href="/logout">

                            <i class="fa-solid fa-right-from-bracket"></i>

                            Sair

                        </a>

                    </li>

                </ul>

            </nav>

        </aside>

        <!-- ========================= -->
        <!-- CONTEÚDO -->
        <!-- ========================= -->

        <main class="content">

            <!-- ========================= -->
            <!-- TOPBAR -->
            <!-- ========================= -->

            <header class="topbar">

                <div>

                    <h1>

                        Cadastrar Membro

                    </h1>

                    <p>

                        Preencha os dados do novo membro.

                    </p>

                </div>

                <button

                    id="btnMenu"

                    class="menu-toggle"

                    aria-label="Abrir menu">

                    <i class="fa-solid fa-bars"></i>

                </button>

            </header>

            <!-- ========================= -->
            <!-- FORMULÁRIO -->
            <!-- ========================= -->

            <form

                id="formCadastro"

                class="cadastro-form"

                enctype="multipart/form-data"
                
                aria-label="Formulário de cadastro de membro">

                <!-- ========================= -->
                <!-- DADOS PESSOAIS -->
                <!-- ========================= -->


                            <!-- LINHA 1 -->

                <div class="form-grid">

                    <div class="form-group">

                        <label for="nome">

                            Nome Completo

                        </label>

                        <input

                            type="text"

                            id="nome"

                            name="nome"

                            placeholder="Digite o nome completo">

                    </div>

                    <div class="form-group">

                        <label for="dataNascimento">

                            Data de Nascimento

                        </label>

                        <input

                            type="text"

                            id="dataNascimento"
                            
                            name="dataNascimento"

                            maxlength="10"

                            inputmode="numeric"


                            autocomplete="off"

                            placeholder="dd/mm/aaaa">

                        <small

                            id="erroData"

                            class="erro-campo">

                        </small>

                    </div>

                </div>

                <!-- LINHA 2 -->

                <div class="form-grid">

                    <div class="form-group">

                        <label for="telefone">

                            Telefone

                        </label>

                        <input

                            type="tel"

                            id="telefone"

                            name="telefone"

                            placeholder="(11) 99999-9999">

                    </div>

                    <div class="form-group">

                        <label for="email">

                            E-mail (Opcional)

                        </label>

                        <input

                            type="email"

                            id="email"

                            name="email"

                            placeholder="email@exemplo.com">

                    </div>

                </div>

                <!-- ENDEREÇO -->

                <div class="form-group">

                    <label for="endereco">

                        Endereço

                    </label>

                    <input

                        type="text"

                        id="endereco"

                        name="endereco"

                        placeholder="Rua, número, bairro...">

                </div>

                <!-- LINHA 3 -->

                <div class="form-grid">

                    <div class="form-group">

                        <label for="cargo">

                            Cargo

                        </label>

                        <select

                            id="cargo"

                            name="cargo">

                            <option value="Membro">Membro</option>

                            <option value="Pastor">Pastor</option>

                            <option value="Presbítero">Presbítero</option>

                            <option value="Diácono">Diácono</option>

                            <option value="Evangelista">Evangelista</option>

                            <option value="Missionário">Missionário</option>

                            <option value="Obreiro">Obreiro</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="ministerio">

                            Ministério

                        </label>

                        <select

                            id="ministerio"

                            name="ministerio">

                            <option value="Louvor">Louvor</option>

                            <option value="Infantil">Infantil</option>

                            <option value="Jovens">Jovens</option>

                            <option value="Casais">Casais</option>

                            <option value="Intercessão">Intercessão</option>

                            <option value="Mídia">Mídia</option>

                            <option value="Recepção">Recepção</option>

                            <option value="Outro">Outro</option>

                        </select>

                    </div>

                </div>

                <!-- LINHA 4 -->

                <div class="form-grid">

                    <div class="form-group">

                        <label for="sexo">

                            Sexo

                        </label>

                        <select

                            id="sexo"

                            name="sexo">

                            <option>Masculino</option>

                            <option>Feminino</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="estadoCivil">

                            Estado Civil

                        </label>

                        <select

                            id="estadoCivil"

                            name="estadoCivil">

                            <option value="Solteiro(a)">Solteiro(a)</option>

                            <option value="Casado(a)">Casado(a)</option>

                            <option value="Divorciado(a)">Divorciado(a)</option>

                            <option value="Viúvo(a)">Viúvo(a)</option>

                        </select>

                    </div>

                </div>

                <!-- OBSERVAÇÕES -->

                <div class="form-group">

                    <label for="observacoes">

                        Observações

                    </label>

                    <textarea

                        id="observacoes"

                        name="observacoes"

                        placeholder="Informações adicionais...">

                    </textarea>

                </div>

                <!-- BOTÕES -->

                <div class="form-buttons">

                    <button

                        type="reset"

                        class="btn-cancelar">

                        Limpar

                    </button>

                    <button

                        type="submit"

                        class="btn-salvar">

                        Salvar Membro

                    </button>

                </div>

            </form>

        </main>

    </div>

    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script

        src="/admin/js/layout/menu.js?v=2.0.0">

    </script>

    <script

        src="/admin/js/cadastro/cadastro.js?v=2.0.0">

    </script>

</body>

</html>
