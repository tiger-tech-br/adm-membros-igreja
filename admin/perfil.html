<!DOCTYPE html>
<html lang="pt-BR">

    <head>

    <!-- ========================= -->
    <!-- META -->
    <!-- ========================= -->

    <meta charset="UTF-8">

    <meta

        name="viewport"

        content="width=device-width, initial-scale=1.0">

    <title>

        Perfil do Membro

    </title>

    <!-- ========================= -->
    <!-- GOOGLE FONTS -->
    <!-- ========================= -->

    <link

        rel="preconnect"

        href="https://fonts.googleapis.com">

    <link

        rel="preconnect"

        href="https://fonts.gstatic.com"

        crossorigin>

    <link

        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"

        rel="stylesheet">

    <!-- ========================= -->
    <!-- FONT AWESOME -->
    <!-- ========================= -->

    <link

        rel="stylesheet"

        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ========================= -->
    <!-- CSS GLOBAL -->
    <!-- ========================= -->

        <link rel="stylesheet" href="/admin/css/global/reset.css">

        <link rel="stylesheet" href="/admin/css/global/variables.css">

        <link rel="stylesheet" href="/admin/css/global/base.css">

        <link rel="stylesheet" href="/admin/css/layout/layout.css">

        <link rel="stylesheet" href="/admin/css/pages/perfil.css?v=2.0.0">

    </head>

        <body>

    <!-- ========================= -->
    <!-- OVERLAY -->
    <!-- ========================= -->

    <div class="overlay"></div>

    <!-- ========================= -->
    <!-- DASHBOARD -->
    <!-- ========================= -->

    <div class="dashboard">

        <!-- ========================= -->
        <!-- SIDEBAR -->
        <!-- ========================= -->

        <aside class="sidebar">

            <div class="logo">

                <img

                    src="/images/assembleia-logo.png"

                    alt="Logo da Igreja">

            </div>

            <nav>

                <ul class="menu">

                    <li>

                        <a href="/dashboard">

                            <i class="fa-solid fa-chart-line" aria-hidden="true"></i>

                            Dashboard

                        </a>

                    </li>

                    <li class="active">

                        <a href="/membros">

                            <i class="fa-solid fa-users" aria-hidden="true"></i>

                            Membros

                        </a>

                    </li>

                    <li>

                        <a href="/cadastro">

                            <i class="fa-solid fa-user-plus"></i>

                            Cadastrar

                        </a>

                    </li>

                    <li class="logout">

                        <a href="/logout">

                            <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>

                            Sair

                        </a>

                    </li>

                </ul>

            </nav>

        </aside>

        <!-- ========================= -->
        <!-- CONTEÚDO -->
        <!-- ========================= -->

        <main class="content">

            <!-- ========================= -->
            <!-- TOPBAR -->
            <!-- ========================= -->

            <header class="topbar">

                <div>

                    <h1>

                        Perfil do Membro

                    </h1>

                    <p>

                        Informações completas do membro.

                    </p>

                </div>

                <div class="topbar-actions">

                    <a

                        href="/membros"

                        class="btn-voltar">

                        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>

                        Voltar

                    </a>

                    <button

                        id="btnMenu"

                        class="menu-toggle"

                        aria-label="Abrir menu">

                        <i class="fa-solid fa-bars" aria-hidden="true"></i>

                    </button>

                </div>

            </header>

            <!-- ========================= -->
            <!-- PERFIL -->
            <!-- ========================= -->

            <section class="perfil-container">

                <article class="perfil-card">
        

        <section class="perfil-container">

            <div class="perfil-card">

                <h3 class="nome-igreja">

                    Assembleia de Deus

                </h3>

                <h2 id="nome"></h2>

                <p

                    id="cargo"

                    class="perfil-cargo">

                </p>

                <!-- ========================= -->
                <!-- CREDENCIAL -->
                <!-- ========================= -->

                <div class="credencial">

                    <div>

                        <strong>

                            Matrícula

                        </strong>

                        <span id="matricula"></span>

                    </div>

                    <div>

                        <strong>

                            Validade

                        </strong>

                        <span id="validade"></span>

                    </div>

                </div>

                <hr>

                <!-- ========================= -->
                <!-- DADOS DO MEMBRO -->
                <!-- ========================= -->

                <div class="perfil-info">

                    <div class="info">

                        <i class="fa-solid fa-phone" aria-hidden="true"></i>

                        <span id="telefone"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-envelope" aria-hidden="true"></i>

                        <span id="email"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-location-dot" aria-hidden="true"></i>

                        <span id="endereco"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-church" aria-hidden="true"></i>

                        <span id="ministerio"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-venus-mars" aria-hidden="true"></i>

                        <span id="sexo"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-heart" aria-hidden="true"></i>

                        <span id="estadoCivil"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-calendar" aria-hidden="true"></i>

                        <span id="nascimento"></span>

                    </div>

                    <div class="info">

                        <i class="fa-solid fa-note-sticky" aria-hidden="true"></i>

                        <span id="observacoes"></span>

                    </div>

                </div>

                <hr>

                <!-- ========================= -->
                <!-- QR CODE -->
                <!-- ========================= -->

                <div class="perfil-qrcode">

                    <h3>

                        QR Code

                    </h3>

                    <img

                        id="qrCode"

                        alt="QR Code do membro">

                    <p>

                        Escaneie para validar

                    </p>

                    <strong>

                        <span id="idMembro"></span>

                    </strong>

                </div>

                <hr>

            </article>

        </section>

    </main>

    </div>

    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script

        src="/admin/js/layout/menu.js?v=2.0.0">

    </script>

    <script

        src="/admin/js/perfil/perfil.js?v=2.0.0">

    </script>

</body>

</html>
